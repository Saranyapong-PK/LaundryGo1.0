// Helper: render laundry SVG icon by id (falls back to first icon)
function SvcIcon({ iconId, color, size=28 }) {
  const found = LAUNDRY_ICONS.find(i=>i.id===iconId) || LAUNDRY_ICONS[0];
  const col = color || '#374151';
  return <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:size,height:size}}
    dangerouslySetInnerHTML={{__html: found.svg(col).replace('width="28"',`width="${size}"`).replace('height="28"',`height="${size}"`)}} />;
}

function ServicesPage() {
  const [svcs, setSvcs] = useState(()=>loadDB().services);
  const [editing, setEditing] = useState(null);
  const [isNew, setIsNew] = useState(false);
  const [showIconPicker, setShowIconPicker] = useState(false);

  function blankSvc() {
    return { id:null, name:'', icon:'🧺', color:'#F8F9FC', iconColor:'#374151',
      unit:'kg', hasOptions:false, price:0, options:[], active:true };
  }
  function startNew(){ setEditing(blankSvc()); setIsNew(true); setShowIconPicker(false); }
  function startEdit(s){ setEditing({...s, options: s.options ? [...s.options.map(o=>({...o}))] : []}); setIsNew(false); setShowIconPicker(false); }
  function cancel(){ setEditing(null); setIsNew(false); setShowIconPicker(false); }

  function addOption() {
    setEditing(p=>({...p, options:[...p.options, {id:'o'+Date.now(),label:'',price:0}]}));
  }
  function updateOption(idx, field, val) {
    setEditing(p=>({...p, options:p.options.map((o,i)=>i===idx?{...o,[field]:val}:o)}));
  }
  function removeOption(idx) {
    setEditing(p=>({...p, options:p.options.filter((_,i)=>i!==idx)}));
  }

  function save(){
    if(!editing.name.trim()) return;
    const svc = {...editing};
    if(svc.hasOptions) { svc.price=0; } else { svc.options=[]; }
    try{await sbSaveService(svc);setSvcs([...loadDB().services]);}catch(e){console.error(e);}
    setEditing(null); setIsNew(false);
  }
  function toggle(svc){
    try{await sbSaveService({...svc,active:!svc.active});setSvcs([...loadDB().services]);}catch(e){}
  }
  function del(id){
    if(!confirm('ลบบริการนี้?')) return;
    try{await sbDeleteService(id);setSvcs([...loadDB().services]);}catch(e){}
  }

  return (
    <div className="space-y" style={{maxWidth:700}}>
      <div className="flex items-center justify-between">
        <h1 style={{fontSize:20,fontWeight:700}}>บริการและราคา</h1>
        <button onClick={startNew} className="btn btn-primary"><PlusIcon/>เพิ่มบริการ</button>
      </div>

      {/* Edit/New form */}
      {editing && (
        <div className="card p-4" style={{border:'2px solid #C7D2FE'}}>
          <h2 style={{fontSize:13,fontWeight:600,marginBottom:14}}>{isNew?'เพิ่มบริการใหม่':'แก้ไขบริการ'}</h2>

          {/* Icon & name row */}
          <div style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:14}}>
            {/* Icon picker trigger */}
            <div style={{position:'relative'}}>
              <button type="button" onClick={()=>setShowIconPicker(v=>!v)}
                style={{width:64,height:64,borderRadius:14,border:'2px solid #E5E7EB',background:editing.color||'#F8F9FC',
                  cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <SvcIcon iconId={editing.icon} color={editing.iconColor} size={32} />
              </button>
              {showIconPicker && (
                <div style={{position:'absolute',top:70,left:0,background:'#fff',border:'1px solid #E5E7EB',
                  borderRadius:14,boxShadow:'0 8px 24px rgba(0,0,0,.14)',zIndex:50,padding:14,width:320}}>
                  <p style={{fontSize:11,fontWeight:600,color:'#9CA3AF',marginBottom:10}}>เลือกไอคอน</p>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:6,marginBottom:14}}>
                    {LAUNDRY_ICONS.map(ic=>(
                      <button key={ic.id} type="button"
                        onClick={()=>setEditing(p=>({...p,icon:ic.id}))}
                        title={ic.label}
                        style={{width:44,height:44,borderRadius:10,
                          border: editing.icon===ic.id?'2px solid #4F63D2':'2px solid transparent',
                          background: editing.icon===ic.id?'#EEF2FF':'#F8F9FC',
                          cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
                        <SvcIcon iconId={ic.id} color={editing.icon===ic.id?'#4F63D2':'#6B7280'} size={22}/>
                      </button>
                    ))}
                  </div>
                  {editing.icon && (
                    <p style={{fontSize:11,color:'#4F63D2',fontWeight:500,marginBottom:10,textAlign:'center'}}>
                      {LAUNDRY_ICONS.find(i=>i.id===editing.icon)?.label}
                    </p>
                  )}
                  <p style={{fontSize:11,fontWeight:600,color:'#9CA3AF',marginBottom:8}}>สีพื้นหลัง</p>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:6}}>
                    {PRESET_COLORS.map((c,i)=>(
                      <button key={i} type="button"
                        onClick={()=>setEditing(p=>({...p,color:c.bg,iconColor:c.icon}))}
                        title={c.name}
                        style={{width:38,height:38,borderRadius:9,background:c.bg,
                          display:'flex',alignItems:'center',justifyContent:'center',
                          border: editing.color===c.bg?'3px solid #4F63D2':'2px solid rgba(0,0,0,.08)',cursor:'pointer'}}>
                        {editing.color===c.bg && (
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={c.icon} strokeWidth="3" strokeLinecap="round">
                            <polyline points="20 6 9 17 4 12"/>
                          </svg>
                        )}
                      </button>
                    ))}
                  </div>
                  <button type="button" onClick={()=>setShowIconPicker(false)}
                    style={{marginTop:12,fontSize:12,color:'#6B7280',border:'none',background:'transparent',cursor:'pointer',display:'block',width:'100%',textAlign:'center'}}>
                    ✕ ปิด
                  </button>
                </div>
              )}
            </div>
            <div style={{flex:1}}>
              <label className="label">ชื่อบริการ</label>
              <input value={editing.name} onChange={e=>setEditing(p=>({...p,name:e.target.value}))}
                className="input" placeholder="เช่น ซัก 12 Kg." autoFocus />
            </div>
          </div>

          {/* Unit + options toggle */}
          <div className="grid2" style={{marginBottom:14}}>
            <div>
              <label className="label">หน่วย</label>
              <select value={editing.unit} onChange={e=>setEditing(p=>({...p,unit:e.target.value}))} className="input">
                {Object.entries(UNITS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
              </select>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,paddingTop:20}}>
              <input type="checkbox" id="hasOpt" checked={!!editing.hasOptions}
                onChange={e=>setEditing(p=>({...p,hasOptions:e.target.checked}))}
                style={{width:16,height:16,accentColor:'#4F63D2',cursor:'pointer'}}/>
              <label htmlFor="hasOpt" style={{fontSize:13,cursor:'pointer',fontWeight:500}}>มีตัวเลือกย่อย</label>
            </div>
          </div>

          {/* Fixed price */}
          {!editing.hasOptions && (
            <div style={{marginBottom:14}}>
              <label className="label">ราคา (บาท)</label>
              <input type="number" min="0" value={editing.price}
                onChange={e=>setEditing(p=>({...p,price:Number(e.target.value)}))} className="input"/>
            </div>
          )}

          {/* Sub-options */}
          {editing.hasOptions && (
            <div style={{marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <label className="label" style={{margin:0}}>ตัวเลือกย่อย ({editing.options.length})</label>
                <button type="button" onClick={addOption}
                  style={{display:'flex',alignItems:'center',gap:4,color:'#4F63D2',border:'none',background:'transparent',fontSize:12,fontWeight:600,cursor:'pointer'}}>
                  <PlusIcon/>เพิ่มตัวเลือก
                </button>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {editing.options.map((opt,idx)=>(
                  <div key={opt.id||idx} style={{display:'grid',gridTemplateColumns:'1fr 100px 32px',gap:8,alignItems:'center',
                    background:'#F8F9FC',borderRadius:10,padding:'10px 12px'}}>
                    <input value={opt.label} onChange={e=>updateOption(idx,'label',e.target.value)}
                      className="input" placeholder={`ตัวเลือกที่ ${idx+1} เช่น น้ำเย็น`} style={{fontSize:13}}/>
                    <input type="number" min="0" value={opt.price} onChange={e=>updateOption(idx,'price',Number(e.target.value))}
                      className="input" placeholder="ราคา" style={{fontSize:13,textAlign:'right'}}/>
                    <button type="button" onClick={()=>removeOption(idx)} className="icon-btn danger"><TrashIcon/></button>
                  </div>
                ))}
                {editing.options.length===0 && (
                  <p style={{fontSize:12,color:'#9CA3AF',textAlign:'center',padding:'12px 0'}}>ยังไม่มีตัวเลือก กด "เพิ่มตัวเลือก"</p>
                )}
              </div>
            </div>
          )}

          <div style={{display:'flex',gap:8,justifyContent:'flex-end',paddingTop:8,borderTop:'1px solid #F3F4F6'}}>
            <button onClick={cancel} className="btn btn-secondary btn-sm"><XIcon/>ยกเลิก</button>
            <button onClick={save} className="btn btn-primary btn-sm"><CheckIcon/>บันทึก</button>
          </div>
        </div>
      )}

      {/* Service cards grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:10}}>
        {svcs.map(s=>(
          <div key={s.id} style={{position:'relative',background:'#fff',borderRadius:14,border:'1px solid #F0F0F0',
            boxShadow:'0 1px 3px rgba(0,0,0,.06)',padding:'14px 12px',opacity:s.active?1:.5,
            display:'flex',flexDirection:'column',alignItems:'center',gap:6,textAlign:'center'}}>
            {/* Active toggle */}
            <button onClick={()=>toggle(s)}
              style={{position:'absolute',top:8,left:8,padding:'2px 8px',borderRadius:6,fontSize:10,fontWeight:500,cursor:'pointer',border:'none',
                background:s.active?'#F0FDF4':'#F3F4F6',color:s.active?'#15803D':'#6B7280'}}>
              {s.active?'เปิด':'ปิด'}
            </button>
            {/* Action buttons */}
            <div style={{position:'absolute',top:6,right:6,display:'flex',gap:2}}>
              <button onClick={()=>startEdit(s)} className="icon-btn" style={{width:26,height:26,borderRadius:6}}><EditIcon/></button>
              <button onClick={()=>del(s.id)} className="icon-btn danger" style={{width:26,height:26,borderRadius:6}}><TrashIcon/></button>
            </div>
            {/* Icon */}
            <div style={{width:52,height:52,borderRadius:12,background:s.color||'#F8F9FC',
              display:'flex',alignItems:'center',justifyContent:'center',marginTop:20}}>
              <SvcIcon iconId={s.icon} color={s.iconColor} size={28} />
            </div>
            <p style={{fontSize:12,fontWeight:600,color:'#1A1D23',lineHeight:1.3}}>{s.name}</p>
            {s.hasOptions ? (
              <div style={{display:'flex',flexDirection:'column',gap:2,width:'100%'}}>
                {(s.options||[]).map(opt=>(
                  <div key={opt.id} style={{display:'flex',justifyContent:'space-between',
                    background:'#F8F9FC',borderRadius:6,padding:'3px 8px',fontSize:11}}>
                    <span style={{color:'#6B7280'}}>{opt.label}</span>
                    <span style={{fontWeight:600,color:'#374151'}}>฿{fmt(opt.price)}</span>
                  </div>
                ))}
              </div>
            ) : (
              <p style={{fontSize:13,fontWeight:700,color:s.iconColor||'#4F63D2'}}>฿{fmt(s.price)}</p>
            )}
            <p style={{fontSize:10,color:'#9CA3AF'}}>/{UNITS[s.unit]||s.unit}</p>
          </div>
        ))}
        {/* Add new button */}
        <button onClick={startNew} type="button"
          style={{background:'#F8F9FC',borderRadius:14,border:'2px dashed #E5E7EB',padding:'14px 12px',
            cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            gap:8,minHeight:140,color:'#9CA3AF',transition:'all .15s'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='#4F63D2';e.currentTarget.style.color='#4F63D2';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='#E5E7EB';e.currentTarget.style.color='#9CA3AF';}}>
          <span style={{fontSize:28}}>＋</span>
          <span style={{fontSize:12,fontWeight:500}}>เพิ่มบริการ</span>
        </button>
      </div>
    </div>
  );
}

// ── Reports ──────────────────────────────────────────────────────────────────
function ReportsPage() {
  const [period, setPeriod] = useState('month');
  const db = loadDB();
  const shop = db.shop;
  const data = useMemo(()=>{
    const bills = db.bills;
    const d = today();
    const ym = d.slice(0,7);
    const filtered = period==='today' ? bills.filter(b=>b.receivedDate===d)
                   : period==='month' ? bills.filter(b=>b.receivedDate?.startsWith(ym))
                   : bills;
    const total = filtered.reduce((s,b)=>s+b.totalAmount,0);
    const paid  = filtered.filter(b=>b.paymentStatus==='paid').reduce((s,b)=>s+b.totalAmount,0);
    // group bills by date with full bill list
    const byDate = {};
    filtered.forEach(b=>{
      const day = b.receivedDate||b.createdAt?.slice(0,10)||'?';
      if(!byDate[day]) byDate[day]={date:day,count:0,total:0,paid:0,bills:[]};
      byDate[day].count++;
      byDate[day].total+=b.totalAmount;
      if(b.paymentStatus==='paid') byDate[day].paid+=b.totalAmount;
      byDate[day].bills.push(b);
    });
    return {filtered, total, paid, unpaid:total-paid, count:filtered.length,
      byDate:Object.values(byDate).sort((a,b)=>b.date.localeCompare(a.date)),
      wsCounts:Object.fromEntries(WORK_STATUSES.map(s=>[s.key,bills.filter(b=>b.workStatus===s.key).length]))
    };
  }, [period]);

  function exportCSV(){
    const rows=[['เลขบิล','ลูกค้า','วันรับ','ยอดรวม','ชำระแล้ว','สถานะ'],
      ...data.filtered.map(b=>[b.billNo,b.customerName,b.receivedDate,b.totalAmount,b.paymentStatus==='paid'?b.totalAmount:0,wsMap[b.workStatus]?.label])];
    const csv=rows.map(r=>r.join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`laundrygo-${period}.csv`; a.click(); URL.revokeObjectURL(url);
  }

  function handlePrintReport() {
    const PERIODS_LABEL = {today:'วันนี้', month:'เดือนนี้', all:'ทั้งหมด'};
    const dayRows = data.byDate.map(d => {
      const billRows = d.bills.map(b => `
        <tr>
          <td>&nbsp;&nbsp;${b.billNo}</td>
          <td>${b.customerName}</td>
          <td>${b.items?.map(i=>i.serviceName).join(', ')||''}</td>
          <td class="right">฿${fmt(b.totalAmount)}</td>
          <td>${b.paymentStatus==='paid'?'✓':'–'}</td>
        </tr>`).join('');
      return `
        <tr style="background:#f0f0f0"><td colspan="5"><b>${d.date}</b> — ${d.count} บิล | ฿${fmt(d.total)} | ชำระ ฿${fmt(d.paid)}</td></tr>
        ${billRows}`;
    }).join('');
    openPrint(`
      <h2>${shop.name}</h2>
      <p class="center">รายงาน: ${PERIODS_LABEL[period]} — พิมพ์ ${new Date().toLocaleDateString('th-TH')}</p><hr>
      <p><b>รวม:</b> ${data.count} บิล | ยอด ฿${fmt(data.total)} | ชำระ ฿${fmt(data.paid)} | ค้าง ฿${fmt(data.unpaid)}</p><hr>
      <table>
        <thead><tr><th>บิล</th><th>ลูกค้า</th><th>บริการ</th><th class="right">ยอด</th><th>จ่าย</th></tr></thead>
        <tbody>${dayRows}</tbody>
      </table>
      <hr><p class="center">${shop.receiptNote||''}</p>
    `);
  }

  const PERIODS=[{key:'today',label:'วันนี้'},{key:'month',label:'เดือนนี้'},{key:'all',label:'ทั้งหมด'}];
  return (
    <div className="space-y" style={{maxWidth:800}}>
      <div className="flex items-center justify-between">
        <h1 style={{fontSize:20,fontWeight:700}}>รายงาน</h1>
        <div style={{display:'flex',gap:8}}>
          <button onClick={handlePrintReport} className="btn btn-secondary" style={{padding:'8px 12px'}} title="พิมพ์รายงาน"><PrintIcon2/></button>
          <button onClick={exportCSV} className="btn btn-secondary btn-sm"><DownloadIcon/>Export CSV</button>
        </div>
      </div>
      <div className="tab-group">
        {PERIODS.map(p=><button key={p.key} onClick={()=>setPeriod(p.key)} className={`tab ${period===p.key?'active':''}`}>{p.label}</button>)}
      </div>
      <div className="grid4">
        <div className="stat-card"><p className="text-xs text-gray">จำนวนบิล</p><p style={{fontSize:26,fontWeight:700}}>{data.count}</p><p className="text-xs text-gray">ใบ</p></div>
        <div className="stat-card"><p className="text-xs text-gray">ยอดรวม</p><p style={{fontSize:20,fontWeight:700}}>฿{fmt(data.total)}</p></div>
        <div className="stat-card">
          <p className="text-xs text-gray">ชำระแล้ว</p>
          <p style={{fontSize:20,fontWeight:700,color:'#15803D'}}>฿{fmt(data.paid)}</p>
          <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:'#6B7280'}}>💵 สด ฿{fmt(data.filtered.filter(b=>b.paymentMethod==='cash').reduce((s,b)=>s+b.totalAmount,0))}</span>
            <span style={{fontSize:10,color:'#6B7280'}}>💳 โอน ฿{fmt(data.filtered.filter(b=>b.paymentMethod==='transfer').reduce((s,b)=>s+b.totalAmount,0))}</span>
          </div>
        </div>
        <div className="stat-card"><p className="text-xs text-gray">ค้างชำระ</p><p style={{fontSize:20,fontWeight:700,color:'#DC2626'}}>฿{fmt(data.unpaid)}</p></div>
      </div>
      <div className="card p-4">
        <h2 style={{fontSize:13,fontWeight:600,marginBottom:12}}>สถานะงานทั้งหมด</h2>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {WORK_STATUSES.map(s=>(
            <div key={s.key} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 14px',background:'#F8F9FC',borderRadius:10}}>
              <span className={`badge ${s.badge}`} style={{fontSize:11}}>{s.label}</span>
              <span style={{fontWeight:600,fontSize:14}}>{data.wsCounts[s.key]||0}</span>
            </div>
          ))}
        </div>
      </div>
      {/* Daily breakdown with full bill details */}
      {data.byDate.length>0 && (
        <div className="card p-4">
          <h2 style={{fontSize:13,fontWeight:600,marginBottom:12}}>รายวัน (แสดงทุกรายการ)</h2>
          {data.byDate.map(d=>(
            <div key={d.date} style={{marginBottom:16}}>
              {/* Day header */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                background:'#F8F9FC',borderRadius:10,padding:'8px 12px',marginBottom:6}}>
                <span style={{fontWeight:600,fontSize:13,color:'#1A1D23'}}>{d.date}</span>
                <div style={{display:'flex',gap:12,fontSize:11,color:'#6B7280'}}>
                  <span>{d.count} บิล</span>
                  <span style={{fontWeight:600,color:'#374151'}}>฿{fmt(d.total)}</span>
                  <span style={{color:'#15803D'}}>ชำระ ฿{fmt(d.paid)}</span>
                  {d.total-d.paid>0 && <span style={{color:'#DC2626'}}>ค้าง ฿{fmt(d.total-d.paid)}</span>}
                </div>
              </div>
              {/* Bills of this day */}
              <div style={{paddingLeft:8}}>
                {d.bills.map((b,bi)=>(
                  <div key={b.id} style={{display:'flex',alignItems:'flex-start',gap:8,
                    padding:'7px 10px',borderBottom:bi<d.bills.length-1?'1px solid #F9FAFB':'none',
                    cursor:'pointer'}}
                    onClick={()=>{}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                        <span style={{fontWeight:600,fontSize:12,color:'#374151'}}>{b.billNo}</span>
                        <span style={{fontSize:12,color:'#6B7280'}}>{b.customerName}</span>
                        {b.customerPhone && <span style={{fontSize:11,color:'#9CA3AF'}}>{b.customerPhone}</span>}
                        <span className={`badge ${wsMap[b.workStatus]?.badge}`} style={{fontSize:10}}>{wsMap[b.workStatus]?.label}</span>
                      </div>
                      <div style={{fontSize:11,color:'#9CA3AF',marginTop:3}}>
                        {b.items?.map(i=>`${i.serviceName} x${i.qty}`).join(' · ')}
                      </div>
                      {b.note && <div style={{fontSize:11,color:'#92400E',marginTop:2}}>📝 {b.note}</div>}
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <p style={{fontWeight:600,fontSize:13}}>฿{fmt(b.totalAmount)}</p>
                      <p style={{fontSize:11,color:b.paymentStatus==='paid'?'#15803D':'#DC2626'}}>
                        {b.paymentStatus==='paid'?'ชำระแล้ว':'ค้างชำระ'}
                      </p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
      {data.filtered.length===0 && (
        <div style={{textAlign:'center',padding:'48px 16px',color:'#9CA3AF',fontSize:13}}>ไม่มีข้อมูลในช่วงเวลานี้</div>
      )}
    </div>
  );
}

// ── Settings ─────────────────────────────────────────────────────────────────
function SettingsPage() {

    const r=new FileReader(); r.onload=ev=>{ setShop(p=>({...p,logo:ev.target.result})); }; r.readAsDataURL(f);
  }
  function save(e){
    e.preventDefault();
    try{await sbSaveShop(shop);}catch(e){console.error(e);}

  return (
    <div className="space-y" style={{maxWidth:600}}>

          <h2 style={{fontSize:13,fontWeight:600,marginBottom:8}}>ข้อมูลร้าน</h2>

                : <input type={t} value={shop[f]||''} onChange={e=>ch(f,e.target.value)} className="input"/>}

            <div><label className="label">เวลาปิด</label><input type="time" value={shop.closeTime||'20:00'} onChange={e=>ch('closeTime',e.target.value)} className="input"/></div>
          </div>
          <div>
            <label className="label">ข้อความท้ายใบเสร็จ</label>
            <textarea value={shop.receiptNote||''} onChange={e=>ch('receiptNote',e.target.value)} className="input" rows={2}/>
          </div>
        </div>

        {/* Printer settings */}
        <div className="card p-4 space-y-sm">
          <h2 style={{fontSize:13,fontWeight:600,marginBottom:8}}>ตั้งค่าเครื่องพิมพ์ใบเสร็จ</h2>
          <div>

              <option value="58">58 มม. (กระดาษแคบ)</option>
              <option value="80">80 มม. (กระดาษกว้าง)</option>
            </select>
          </div>
          <div>
            <label className="label">การเชื่อมต่อ</label>
            <select value={shop.printerConn||'browser'} onChange={e=>ch('printerConn',e.target.value)} className="input">

              📱 การพิมพ์ผ่านบลูทูธ: เปิดแอปในเบราว์เซอร์บนโทรศัพท์ แล้วกดปุ่มพิมพ์ — ระบบจะเชื่อมต่อเครื่องพิมพ์บลูทูธที่จับคู่ไว้อัตโนมัติผ่าน Web Bluetooth API (รองรับ Chrome/Android)

        <button type="submit" className="btn btn-primary" style={{width:'100%'}}>
          {saved ? '✓ บันทึกแล้ว!' : 'บันทึกการตั้งค่า'}
        </button>
      </form>
    </div>
  );
}

// ── Users ─────────────────────────────────────────────────────────────────────
function UsersPage({ session }) {
  const [users, setUsers] = useState(()=>loadDB().users);
  const [editing, setEditing] = useState(null);
  const [isNew, setIsNew] = useState(false);

  function startNew(){ setEditing({id:null,name:'',email:'',password:'',role:'staff',active:true}); setIsNew(true); }
  function startEdit(u){ setEditing({...u,password:''}); setIsNew(false); }
  function cancel(){ setEditing(null); setIsNew(false); }
  function save(){
    if(!editing.name.trim()||!editing.email.trim()) return;
    if(isNew&&!editing.password) return;
    mutateDB(db=>{
      if(isNew) db.users.push({...editing,id:'u'+Date.now()});
      else { const i=db.users.findIndex(u=>u.id===editing.id); if(i>=0){ if(!editing.password) delete editing.password; db.users[i]={...db.users[i],...editing}; } }
    });
    setUsers(loadDB().users); setEditing(null); setIsNew(false);
  }
  function del(id){
    if(id===session.userId){ alert('ไม่สามารถลบบัญชีตัวเองได้'); return; }
    if(!confirm('ลบผู้ใช้งานนี้?')) return;
    mutateDB(db=>{ db.users=db.users.filter(u=>u.id!==id); });
    setUsers(loadDB().users);
  }
  return (
    <div className="space-y" style={{maxWidth:600}}>
      <div className="flex items-center justify-between">
        <h1 style={{fontSize:20,fontWeight:700}}>จัดการพนักงาน</h1>
        <button onClick={startNew} className="btn btn-primary"><PlusIcon/>เพิ่มผู้ใช้งาน</button>
      </div>
      {editing && (
        <div className="card p-4 space-y-sm" style={{border:'2px solid #C7D2FE'}}>
          <h2 style={{fontSize:13,fontWeight:600}}>{isNew?'เพิ่มผู้ใช้งานใหม่':'แก้ไขผู้ใช้งาน'}</h2>
          <div>
            <label className="label">ชื่อ-นามสกุล</label>
            <input value={editing.name} onChange={e=>setEditing(p=>({...p,name:e.target.value}))} className="input" autoFocus/>
          </div>
          <div className="grid2">
            <div>
              <label className="label">อีเมล</label>
              <input type="email" value={editing.email} onChange={e=>setEditing(p=>({...p,email:e.target.value}))} className="input"/>
            </div>
            <div>
              <label className="label">{isNew?'รหัสผ่าน':'รหัสผ่านใหม่ (เว้นว่างหากไม่เปลี่ยน)'}</label>
              <input type="password" value={editing.password} onChange={e=>setEditing(p=>({...p,password:e.target.value}))} className="input" placeholder={isNew?'อย่างน้อย 6 ตัวอักษร':'(ไม่เปลี่ยน)'}/>
            </div>
          </div>
          <div className="grid2">
            <div>
              <label className="label">บทบาท</label>
              <select value={editing.role} onChange={e=>setEditing(p=>({...p,role:e.target.value}))} className="input">
                <option value="owner">เจ้าของร้าน</option>
                <option value="staff">พนักงาน</option>
              </select>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,paddingTop:20}}>
              <input type="checkbox" id="ua" checked={editing.active} onChange={e=>setEditing(p=>({...p,active:e.target.checked}))} style={{width:16,height:16,accentColor:'#4F63D2'}}/>
              <label htmlFor="ua" style={{fontSize:13,cursor:'pointer'}}>เปิดใช้งาน</label>
            </div>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button onClick={cancel} className="btn btn-secondary btn-sm"><XIcon/>ยกเลิก</button>
            <button onClick={save} className="btn btn-primary btn-sm"><CheckIcon/>บันทึก</button>
          </div>
        </div>
      )}
      <div className="card">
        {users.map(u=>(
          <div key={u.id} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',borderBottom:'1px solid #F9FAFB',opacity:u.active?1:.5}}>
            <div className="avatar">{u.name[0]}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                <span style={{fontWeight:500,fontSize:13}}>{u.name}</span>
                <span className={`badge ${u.role==='owner'?'badge-purple':'badge-gray'}`} style={{fontSize:11}}>
                  {u.role==='owner'?'เจ้าของร้าน':'พนักงาน'}
                </span>
                {!u.active && <span className="badge badge-red" style={{fontSize:11}}>ปิดใช้งาน</span>}
                {u.id===session.userId && <span className="badge badge-blue" style={{fontSize:11}}>คุณ</span>}
              </div>
              <p style={{fontSize:11,color:'#9CA3AF',marginTop:2}}>{u.email}</p>
            </div>
            <div style={{display:'flex',gap:4}}>
              <button onClick={()=>startEdit(u)} className="icon-btn"><EditIcon/></button>
              <button onClick={()=>del(u.id)} className="icon-btn danger"><TrashIcon/></button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Mount ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
